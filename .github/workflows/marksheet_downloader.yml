name: Daily Marksheet Downloader

on:
  schedule:
    # Runs everyday at 4:00 AM UTC (9:30 AM IST)
    - cron: '0 4 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright cryptography playwright-stealth
        playwright install chromium

    - name: Restore Session Cache
      uses: actions/cache@v4
      with:
        path: state.json
        key: session-state-${{ github.run_id }}
        restore-keys: |
          session-state-

    - name: Run Downloader
      env:
        PORTAL_USERNAME: ${{ secrets.PORTAL_USERNAME }}
        PORTAL_PASSWORD: ${{ secrets.PORTAL_PASSWORD }}
        STATE_PATH_ENV: 'state.json'
        SCREENSHOT_DIR_ENV: 'screenshots'
      run: |
        mkdir -p screenshots
        python -u downloader.py

    - name: Commit and Push Results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add downloads/ || true
        git add -f screenshots/ || true
        git add state.json || true
        git commit -m "Auto-downloaded latest marksheets and logs" || exit 0
        git push
